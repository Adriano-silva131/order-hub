services:
  postgres:
    image: postgres:16
    container_name: orderdb
    restart: unless-stopped
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: orderdb
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: